resources:
  jobs:
    Zerobus_job:
      name: Zerobus_job

      tasks:
        - task_key: run_producer
          notebook_task:
            notebook_path: ../src/producer.py
          environment_key: default

        environments:
          - environment_key: default
            spec:
              environment_version: "2"
              dependencies:
                - databricks-zerobus
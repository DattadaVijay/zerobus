resources:
  jobs:
    Zerobus_job:
      name: Zerobus_job

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - databricks-zerobus

      tasks:
        - task_key: run_producer
          environment_key: default
          notebook_task:
            notebook_path: ../src/producer.py